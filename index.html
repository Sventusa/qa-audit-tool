.header{

    grid-template-columns: auto 1fr auto;
    align-items:center;

.header h2{
    text-align: center;
    color:#5a3ff2;

  display: grid;
  grid-template-columns: 320px 1fr;

    background:#faf8ff;

.main{

.card{
    background:white;

    box-shadow:0 4px 10px rgba(90,63,242,0.05);

    margin-bottom:10px;

input,

    padding:8px;
    margin-top:5px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:8px;

textarea{
    resize:vertical;
}

.stats{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:10px;
    margin-bottom:15px;

.stat{
    background:white;

.section{

     box-shadow:0 4px 10px rgba(90,63,242,0.05);

.theme-switch{
  position: relative;
  width: 50px;
  height: 26px;
}

.theme-switch input{
  display:none;
}

.slider{
  position: absolute;
  cursor: pointer;
  background-color: #ccc;
  border-radius: 34px;
  inset: 0;
  transition: 0.3s;
}

.slider:before{
  content: "🌙";
  position: absolute;
  height: 22px;
  width: 22px;
  left: 2px;
  top: 2px;
  background: white;
  border-radius: 50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:12px;
  transition: 0.3s;
}

.theme-switch input:checked + .slider{
  background-color: #5a3ff2;
}

.theme-switch input:checked + .slider:before{
  transform: translateX(24px);
  content: "☀️";
}

function setScore(button,value,milestone){

const parent =
button.parentElement;

parent
.querySelectorAll(".score-btn")
.forEach(btn=>{

btn.classList.remove(
"selected-pass",
"selected-fail",
"selected-coaching",
"selected-na"
);

});

if(value==="Pass"){

button.classList.add("selected-pass");

}

if(value==="Fail"){

button.classList.add("selected-fail");

}

if(value==="Coaching"){

button.classList.add("selected-coaching");

}

if(value==="N/A"){

button.classList.add("selected-na");

}

const hidden =
parent.querySelector(".score-value");

hidden.value=value;

updateCounts();

}

function sectionScore(button,value){

const body =
button.closest(".section-body");

body.querySelectorAll(".score-value")
.forEach(x=>x.value=value);

updateCounts();

}

function updateCounts(){

let pass=0;
let fail=0;
let coach=0;
let na=0;

document
.querySelectorAll(".score-value")
.forEach(x=>{

if(x.value==="Pass") pass++;
if(x.value==="Fail") fail++;
if(x.value==="Coaching") coach++;
if(x.value==="N/A") na++;

});

const autoFails = selectedAutoFails.length;

passCount.innerText=pass;
failCount.innerText=fail;
coachCount.innerText=coach;
naCount.innerText=na;
autoFailCount.innerText=autoFails;

let result="PASSED";

if(autoFails>0){

result="AUTOFAIL";

}
else if(fail >= 2){

result="FAILED";

}
else if(fail === 1){

result="MISSED MILESTONE";

}
else if(coach>0){

result="COACHING";

}

auditResult.innerText=result;

const banner = document.querySelector(".result-banner");

banner.classList.remove(
  "result-pass",
  "result-coaching",
  "result-missed",
  "result-fail"
);

const main = document.querySelector(".main");

main.style.background = "#f5f0ff"; // default

if(result === "PASSED"){
  main.style.backgroundColor = "#f1f8e9";
}
else if(result === "COACHING"){
  main.style.backgroundColor = "#fffde7";
}
else if(result === "MISSED MILESTONE"){
  main.style.backgroundColor = "#fff3e0";
}
else if(result === "FAILED" || result === "AUTOFAIL"){
  main.style.backgroundColor = "#ffebee";
}

if(result === "PASSED"){
  banner.classList.add("result-pass");
}
else if(result === "COACHING"){
  banner.classList.add("result-coaching");
}
else if(result === "MISSED MILESTONE"){
  banner.classList.add("result-missed");
}
else if(result === "FAILED" || result === "AUTOFAIL"){
  banner.classList.add("result-fail");
}

generateSmartPost();

}

function addAutoFail(){

  const select =
    document.getElementById("autoFailSelector");

  const value = select.value;

  if(!value) return;

  if(selectedAutoFails.includes(value)) return;

  selectedAutoFails.push(value);

  renderAutoFails();

  updateCounts();

}

function removeAutoFail(index){

  selectedAutoFails.splice(index,1);

  renderAutoFails();

  updateCounts();

}

function renderAutoFails(){

  const container =
    document.getElementById("selectedAutoFails");

  container.innerHTML = "";

  selectedAutoFails.forEach((item,index)=>{

    container.innerHTML += `
      <div class="card"
           style="
             display:flex;
             justify-content:space-between;
             align-items:center;
             padding:8px;
             margin-bottom:5px;
           ">

        <span>${item}</span>

        <button
          class="utility-btn"
          style="padding:4px 10px;"
          onclick="removeAutoFail(${index})">
          ✕
        </button>

      </div>
    `;

  });

}

replacementGap==="Fail"
){

gapSummary =
"GAP (No): Cx has GAP — Explained pro-rated refund but didn't inform about replacement GAP";

}
else if(
gapRefund==="Fail" &&
replacementGap==="Pass"
){

gapSummary =
"GAP (No): Cx has GAP — Didn't explain about pro-rated refund but positioned replacement GAP on the new loan";

}
else if(
gapRefund==="Fail" &&
replacementGap==="Fail"
){

gapSummary =
"GAP (No): Cx has GAP — Didn't explain about pro-rated refund and didn't inform about replacement GAP";

}
else if(
negativeEquity==="Pass"
){

gapSummary =
"GAP (Yes): Cx didn't have GAP — Explained negative equity protection in the event of a total loss";

}
else if(
negativeEquity==="Fail"
){

gapSummary =
"GAP (No): Cx didn't have GAP — Didn't explain about negative equity protection in the event of a total loss";

}
}

const warrantyLength =
getScore("Warranty Coverage Length");

const warrantyRefund =
getScore("Warranty Refund");

const warrantyBetter =
getScore("Warranty Better Longer Cheaper");

const warrantyWhy =
getScore("Warranty Why Not Purchased");

const warrantyCoverage =
getScore("Warranty Better Coverage");

const warrantyCost =
getScore("Warranty Lower Cost");

if(warrantyType==="unsure"){

const notes =
document.getElementById(
"warrantyManualNotes"
)?.value || "";

warrantySummary =
notes.trim()
?
`Warranty (Manual): ${notes}`
:
"Warranty (Manual): Unable to determine warranty ownership";

}
else {

  const formatList = function(items) {
    if (items.length === 0) return "";
    if (items.length === 1) return items[0];
    if (items.length === 2) return items[0] + " and " + items[1];
    return items.slice(0, -1).join(", ") + ", and " + items[items.length - 1];
  };

  if (warrantyType === "with") {

    let passed = [];
    let failed = [];

    const hasWarrantyChecks = [
      {
        value: warrantyLength,
        passText: "asked how long they were covered",
        failText: "did not ask how long they were covered"
      },
      {
        value: warrantyRefund,
        passText: "highlighted getting pro-rated refunds",
        failText: "did not highlight getting pro-rated refunds"
      },
      {
        value: warrantyBetter,
        passText: "positioned our warranty as cheaper, longer, and better",
        failText: "did not position our warranty as cheaper, longer, and better"
      }
    ];

for (let i = 0; i < hasWarrantyChecks.length; i++) {
  if (hasWarrantyChecks[i].value === "Pass") {
    passed.push(hasWarrantyChecks[i].passText);
  }
  else if (hasWarrantyChecks[i].value === "Fail") {
    failed.push(hasWarrantyChecks[i].failText);
  }
}

if (passed.length === 0 && failed.length === 0) {
  warrantySummary = "Warranty: N/A";
}
else

    if (failed.length === 0) {
      warrantySummary =
        "Warranty (Yes): Cx has extended warranty — " +
        formatList(passed) +
        ".";
    }
    else if (passed.length > 0) {
      warrantySummary =
        "Warranty (No): Cx has extended warranty — " +
        formatList(passed) +
        ", but " +
        formatList(failed) +
        ".";
    }
    else {
      warrantySummary =
        "Warranty (No): Cx has extended warranty — " +
        formatList(failed) +
        ".";
    }

  }
  else if (warrantyType === "without") {

    let passed2 = [];
    let failed2 = [];

    const noWarrantyChecks = [
      {
        value: warrantyWhy,
        passText: "asked why they didn't purchase warranty",
        failText: "did not ask why they didn't purchase warranty"
      },
      {
        value: warrantyCoverage,
        passText: "positioned better coverage",
        failText: "did not properly position better coverage"
      },
      {
        value: warrantyCost,
        passText: "presented it at a lower cost",
        failText: "did not present it at a lower cost"
      }
    ];


for (let i = 0; i < noWarrantyChecks.length; i++) {
  if (noWarrantyChecks[i].value === "Pass") {
    passed2.push(noWarrantyChecks[i].passText);
  }
  else if (noWarrantyChecks[i].value === "Fail") {
    failed2.push(noWarrantyChecks[i].failText);
  }
}

if (passed2.length === 0 && failed2.length === 0) {
  warrantySummary = "Warranty: N/A";
}
else

    if (failed2.length === 0) {
      warrantySummary =
        "Warranty (Yes): Cx didn't have warranty — " +
        formatList(passed2) +
        ".";
    }
    else if (passed2.length > 0) {
      warrantySummary =
        "Warranty (No): Cx didn't have warranty — " +
        formatList(passed2) +
        ", but " +
        formatList(failed2) +
        ".";
    }
    else {
      warrantySummary =
        "Warranty (No): Cx didn't have warranty — " +
        formatList(failed2) +
        ".";
    }

  }

}

return {
  gapSummary,
  warrantySummary
};

}

function togglePassword(){
  const pass = document.getElementById("password");
  pass.type = pass.type === "password" ? "text" : "password";
}


let currentUser = null;

function login(){

const user = document.getElementById("username").value;
const pass = document.getElementById("password").value;

if(users[user] && users[user].password === pass){

  currentUser = user;

  localStorage.setItem("qaUser", user);

  const errorEl = document.getElementById("loginError");
  if(errorEl) errorEl.innerText = "";

  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("appContainer").style.display = "block";

  applyUserSettings();

}else{

  const errorEl = document.getElementById("loginError");
  if(errorEl){
    errorEl.innerText = "Invalid username or password";
  }

}

}

function logout(){

    localStorage.removeItem("qaUser");

  currentUser = null;

    document.getElementById("appContainer").style.display = "none";
  document.getElementById("loginScreen").style.display = "flex";

    document.getElementById("username").value = "";
  document.getElementById("password").value = "";

    const errorEl = document.getElementById("loginError");
  if(errorEl) errorEl.innerText = "";

}

window.onload = function(){

const darkMode = localStorage.getItem("darkMode");

if(darkMode === "true"){
  document.body.classList.add("dark-mode");

  const toggle = document.querySelector(".theme-switch input");
  if(toggle){
    toggle.checked = true;
  }
}

const savedUser = localStorage.getItem("qaUser");

if(savedUser && users[savedUser]){

  currentUser = savedUser;

  document.getElementById("loginScreen").style.display="none";
  document.getElementById("appContainer").style.display="block";

  applyUserSettings();

}

};


function applyUserSettings(){

const config = users[currentUser];

auditMode = config.defaultMode || "normal";

document.querySelector(".header h2").innerText =
`QA Audit Form - ${currentUser.charAt(0).toUpperCase() + currentUser.slice(1)}`;

document.getElementById("userDisplay").innerText =
"Logged in as: " + currentUser;

document.querySelectorAll("#modeToggle .score-btn")
.forEach(btn => {
  btn.classList.remove("selected-pass");
});

const buttons = document.querySelectorAll("#modeToggle .score-btn");

if(auditMode === "normal"){
  buttons[0].classList.add("selected-pass");
}else if(auditMode === "tyson"){
  buttons[1].classList.add("selected-pass");
}

applyMode();

}

function switchTab(tab, el){
  document.querySelectorAll("#auditTab, #postTab")
    .forEach(x => x.classList.add("hidden"));

  document.getElementById(tab + "Tab").classList.remove("hidden");

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
}

function setMode(button, mode){

auditMode = mode;

document.querySelectorAll("#modeToggle .score-btn")
.forEach(btn=>{
btn.classList.remove(
"selected-pass",
"selected-fail",
"selected-coaching",
"selected-na"
);
});

button.classList.add("selected-pass");

applyMode();

}

function applyMode(){

document.querySelectorAll('[data-milestone="Branding Statement Input"]')
.forEach(el=>{
if(el.closest(".section")){
el.closest(".section").style.display =
auditMode === "tyson" ? "block" : "none";
}
});

[
"HLKV",
"HLKV Used in Value Build",
"HLKV Used in Benefits Recap"
].forEach(name=>{


document.querySelectorAll(`[data-milestone="${name}"]`)
.forEach(el => {

  const section = el.closest(".section");

  if(section){
    section.style.display =
    auditMode === "tyson" ? "block" : "none";
  }

});

});

}

const passField = document.getElementById("password");

if(passField){
  passField.addEventListener("keydown", function(e){

    if(e.key === "Enter"){
      e.preventDefault(); 
      login();
    }

  });
}

document.querySelectorAll("input, textarea, select").forEach(el => {
  if(el.id !== "postText"){   // ✅ EXCLUDE POST BOX
    el.addEventListener("input", generateSmartPost);
  }
});
